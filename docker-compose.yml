services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
    command: >
      gcloud beta emulators pubsub start
      --host-port=0.0.0.0:8085
      --project=local-project
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  fake-gcs:
    image: fsouza/fake-gcs-server
    ports:
      - "4443:4443"
    # -scheme http avoids TLS; -public-host tells the server how to construct self-referencing URLs
    command: -scheme http -port 4443 -public-host localhost:4443
    volumes:
      - gcs-data:/storage
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4443/storage/v1/b"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cdc_pipeline
      POSTGRES_USER: cdc_user
      POSTGRES_PASSWORD: cdc_pass
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdc_user -d cdc_pipeline"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  gcs-data:
  pg-data:
